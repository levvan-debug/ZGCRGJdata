<div class="detail-section"><strong>（六）参考文献：</strong><br>【1】王随《传灯玉英集·残卷》<br>【2】志磐《佛祖统纪》<br>【3】郭声波点校《宋会要辑稿·蕃夷道释》<br>【4】脱脱《宋史》<br>【5】陈垣《中国佛教史籍概论》<br>【6】严绍璗《日藏汉籍善本书录》<br>【7】[日]石井修道《宋代禅籍逸书序跋考》<br>【8】[日]释成寻《参天台五台山记》</div>`
}
];

// 全局保存搜索结果
let currentResult = [];

function render(list) {
    currentResult = list;
    const box = document.getElementById('list');
    box.innerHTML = list.map((b, i) => `
    <div class="book-item" onclick="openDetail(${i})">
        <div class="book-title">${b.name}</div>
        <div class="book-info">${b.author}｜${b.version}</div>
    </div>
    `).join('');
}

function search() {
    const kw = document.getElementById('search').value.toLowerCase();
    const res = books.filter(b => 
        b.name.toLowerCase().includes(kw) || 
        b.author.toLowerCase().includes(kw) || 
        b.version.toLowerCase().includes(kw) ||
        b.original.toLowerCase().includes(kw) || 
        b.current.toLowerCase().includes(kw)
    );
    render(res);
}

// 已修复：搜索后也能正确打开详情
function openDetail(i) {
    const b = currentResult[i];
    if (b.full === "empty") {
        document.getElementById('detail').innerHTML = `
            <div class="detail-title">${b.name}</div>
            <div class="empty-tip">正在更新中……请稍候访问</div>
        `;
    } else {
        document.getElementById('detail').innerHTML = `
            <div class="detail-title">${b.name}</div>
            ${b.full}
        `;
    }
    document.getElementById('modal').style.display = "flex";
}

function closeModal() {
    document.getElementById('modal').style.display = "none";
}

render(books);
</script>
</body>
