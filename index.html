let currentResult = [];

// 搜索功能
function search() {
    let kw = document.getElementById("search").value.toLowerCase().trim();
    let list = document.getElementById("list");
    
    if (!kw) {
        list.style.display = "none";
        currentResult = [];
        return;
    }

    let result = books.filter(b => 
        b.name.toLowerCase().includes(kw) ||
        b.author.toLowerCase().includes(kw) ||
        b.version.toLowerCase().includes(kw) ||
        b.original.toLowerCase().includes(kw) ||
        b.current.toLowerCase().includes(kw)
    );

    currentResult = result;
    list.style.display = "grid";
    list.innerHTML = result.map((b, i) => `
    <div class="book-item" onclick="openDetail(${i})">
        <div class="book-title">${b.name}</div>
        <div class="book-info">${b.author}｜${b.version}</div>
    </div>
    `).join('');
}

// 打开详情
function openDetail(i) {
    let b = currentResult[i];
    let content = b.full === "empty" 
        ? `<div class="detail-title">${b.name}</div><div class="empty-tip">内容正在完善中……</div>`
        : `<div class="detail-title">${b.name}</div>${b.full}`;
    document.getElementById("detail").innerHTML = content;
    document.getElementById("modal").style.display = "flex";
}

// 关闭详情
function closeModal() {
    document.getElementById("modal").style.display = "none";
}
</script>
